// SLIDE 14 — LIVE LAB
// ═══════════════════════════════════════════════════════════
let pHistory=[];
function runLab(){
  const b1=parseFloat(document.getElementById('lab_b1').value);
  const sig=parseFloat(document.getElementById('lab_sig').value);
  const n=parseInt(document.getElementById('lab_n').value);
  document.getElementById('lv_b1').textContent=b1.toFixed(1);
  document.getElementById('lv_sig').textContent=sig.toFixed(0);
  document.getElementById('lv_n').textContent=n;
  const xs=[],ys=[];
  for(let i=0;i<n;i++){const x=1+Math.random()*19;xs.push(x);ys.push(10+b1*x+randn()*sig);}
  const r=ols(xs,ys);
  document.getElementById('lb_b').textContent=r.b1.toFixed(3);
  document.getElementById('lb_se').textContent=r.se.toFixed(3);
  const tEl=document.getElementById('lb_t');
  tEl.textContent=r.t.toFixed(2);tEl.style.color=Math.abs(r.t)>1.96?'#3ecfb2':'#f47070';
  const pEl=document.getElementById('lb_p');
  pEl.textContent=pFmt(r.p);pEl.style.color=r.p<0.05?'#4bd49a':'#f47070';
  const ci=[r.b1-1.96*r.se,r.b1+1.96*r.se];
  document.getElementById('lb_ci').textContent='['+ci[0].toFixed(2)+', '+ci[1].toFixed(2)+']';
  const vd=document.getElementById('lb_verdict');
  if(r.p<0.05){vd.textContent='REJECT H\u2080';vd.style.color='#4bd49a';vd.style.borderColor='rgba(75,212,154,.4)';vd.style.background='rgba(75,212,154,.08)';}
  else{vd.textContent='FAIL TO REJECT';vd.style.color='#f47070';vd.style.borderColor='rgba(244,112,112,.3)';vd.style.background='rgba(244,112,112,.05)';}
  drawLabCanvas(xs,ys,r);
  pHistory=[r.p];
  drawPDist();
}
function runLab100(){
  const b1=parseFloat(document.getElementById('lab_b1').value);
  const sig=parseFloat(document.getElementById('lab_sig').value);
  const n=parseInt(document.getElementById('lab_n').value);
  pHistory=[];
  for(let run=0;run<100;run++){
    const xs=[],ys=[];
    for(let i=0;i<n;i++){const x=1+Math.random()*19;xs.push(x);ys.push(10+b1*x+randn()*sig);}
    const r=ols(xs,ys);pHistory.push(r.p);
  }
  const power=pHistory.filter(p=>p<0.05).length;
  document.getElementById('lb_power').textContent=power+'%';
  const hist=document.getElementById('lab_history');
  hist.innerHTML='Last 10 p-values:<br>'+pHistory.slice(-10).map(p=>'<span style="color:'+(p<0.05?'#4bd49a':'#f47070')+'">'+(p<0.0001?'<.0001':p.toFixed(3))+'</span>').join('  ');
  drawPDist();
}
function drawLabCanvas(xs,ys,r){
  const c=document.getElementById('labCanvas');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height,pad=28;
  clr(ctx,W,H);
  const xMn=0,xMx=21,yMn=Math.min(...ys)-3,yMx=Math.max(...ys)+3;
  const px=x=>pad+(x-xMn)/(xMx-xMn)*(W-2*pad);
  const py=y=>H-pad-(y-yMn)/(yMx-yMn)*(H-2*pad);
  axes(ctx,W,H,pad);
  xs.forEach((x,i)=>{ctx.beginPath();ctx.arc(px(x),py(ys[i]),3,0,Math.PI*2);ctx.fillStyle='rgba(91,156,245,0.65)';ctx.fill();});
  ctx.beginPath();ctx.moveTo(px(xMn),py(r.b0));ctx.lineTo(px(xMx),py(r.b0+r.b1*xMx));
  ctx.strokeStyle='rgba(232,97,79,0.85)';ctx.lineWidth=2;ctx.stroke();
}
function drawPDist(){
  const c=document.getElementById('pDistCanvas');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height,pad=20;
  clr(ctx,W,H);
  if(pHistory.length===0)return;
  const bins=new Array(20).fill(0);
  pHistory.forEach(p=>bins[Math.min(Math.floor(p*20),19)]++);
  const mx=Math.max(...bins,1);
  const bw=(W-2*pad)/20;
  bins.forEach((cnt,i)=>{
    const x=pad+i*bw;
    const h=(cnt/mx)*(H-2*pad);
    const p_mid=(i+0.5)/20;
    ctx.fillStyle=p_mid<0.05?'rgba(75,212,154,0.6)':'rgba(94,94,120,0.4)';
    ctx.fillRect(x,H-pad-h,bw-1,h);
  });
  // alpha line
  const alphaX=pad+0.05*20*bw;
  ctx.strokeStyle='rgba(232,97,79,0.8)';ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
  ctx.beginPath();ctx.moveTo(alphaX,pad);ctx.lineTo(alphaX,H-pad);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(94,94,120,0.7)';ctx.font='8px Fira Code';ctx.textAlign='center';
  ctx.fillText('0',pad,H-pad+11);ctx.fillText('0.5',W/2,H-pad+11);ctx.fillText('1',W-pad,H-pad+11);
}

// ═══════════════════════════════════════════════════════════
// SLIDE 15 — R2 DEMO
// ═══════════════════════════════════════════════════════════
function drawR2Demo(){
  const pct=parseInt(document.getElementById('r2_slider').value)/100;
  document.getElementById('r2_val').textContent=pct.toFixed(2);
  const c=document.getElementById('r2Canvas');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height,pad=28;
  clr(ctx,W,H);
  const n=40,trueB1=3*(pct**0.5),sigma=12*(1-pct)**0.7;
  const xs=[],ys=[];
  for(let i=0;i<n;i++){const x=1+i/n*18;xs.push(x);ys.push(5+trueB1*x+randn()*sigma);}
  const r=ols(xs,ys);
  const xMn=0,xMx=20,yMn=Math.min(...ys)-2,yMx=Math.max(...ys)+2;
  const px=x=>pad+(x-xMn)/(xMx-xMn)*(W-2*pad);
  const py=y=>H-pad-(y-yMn)/(yMx-yMn)*(H-2*pad);
  // TSS visualised as vertical lines to mean
  const yb=r.yb;
  xs.forEach((x,i)=>{
    ctx.beginPath();ctx.moveTo(px(x),py(yb));ctx.lineTo(px(x),py(ys[i]));
    ctx.strokeStyle='rgba(159,122,234,0.2)';ctx.lineWidth=1;ctx.stroke();
  });
  // RSS lines
  xs.forEach((x,i)=>{
    ctx.beginPath();ctx.moveTo(px(x),py(r.b0+r.b1*x));ctx.lineTo(px(x),py(ys[i]));
    ctx.strokeStyle='rgba(232,97,79,0.3)';ctx.lineWidth=1.5;ctx.stroke();
  });
  // mean line
  ctx.beginPath();ctx.moveTo(px(xMn),py(yb));ctx.lineTo(px(xMx),py(yb));
  ctx.strokeStyle='rgba(159,122,234,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.stroke();
  ctx.setLineDash([]);
  // fitted
  ctx.beginPath();ctx.moveTo(px(xMn),py(r.b0));ctx.lineTo(px(xMx),py(r.b0+r.b1*xMx));
  ctx.strokeStyle='rgba(232,97,79,0.9)';ctx.lineWidth=2;ctx.stroke();
  // points
  xs.forEach((x,i)=>{ctx.beginPath();ctx.arc(px(x),py(ys[i]),3,0,Math.PI*2);ctx.fillStyle='rgba(91,156,245,0.7)';ctx.fill();});
  axes(ctx,W,H,pad);
  // R2 annotation
  const tss=ys.reduce((s,y)=>s+(y-r.yb)**2,0);
  const r2=1-r.rss/tss;
  ctx.fillStyle='rgba(200,200,230,0.9)';ctx.font='bold 12px Fira Code';ctx.textAlign='right';
  ctx.fillText('R\u00b2='+r2.toFixed(2),W-pad-4,pad+14);
  ctx.fillStyle='rgba(94,94,120,0.6)';ctx.font='9px Space Grotesk';ctx.textAlign='right';
  ctx.fillText('Purple=TSS | Red=RSS',W-pad-4,H-pad-5);
}

setTimeout(drawSamplingDemo,200);
