<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISLP — Chapters 1–7 Interactive Slides</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=Inter:wght@300;400;500;600&display=swap');
:root {
  --bg:#09090f; --surf:#12121e; --surf2:#1a1a2e; --border:rgba(255,255,255,0.07);
  --ind:#818cf8; --ind2:#c7d2fe; --teal:#2dd4bf; --coral:#fb7185;
  --amber:#fbbf24; --green:#4ade80; --blue:#60a5fa; --purple:#a78bfa;
  --text:#f0f0f8; --muted:#6b7280; --serif:'Fraunces',serif; --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0;}
.brand{font-family:var(--serif);font-size:13px;color:var(--ind2);letter-spacing:.01em;}
.hctl{display:flex;align-items:center;gap:8px;}
.hbtn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--sans);font-size:11px;padding:5px 14px;border-radius:5px;cursor:pointer;transition:all .2s;}
.hbtn:hover{border-color:var(--ind);color:var(--ind2);}
.hbtn.p{background:var(--ind);border-color:var(--ind);color:#fff;}
.hbtn.p:hover{background:#6366f1;}
.sctr{font-size:11px;color:var(--muted);min-width:52px;text-align:center;}

/* PROGRESS */
.prog{height:2px;background:var(--border);flex-shrink:0;}
.pf{height:100%;background:linear-gradient(90deg,var(--ind),var(--purple));transition:width .4s ease;}

/* CHAPTER TABS */
.ctabs{display:flex;border-bottom:1px solid var(--border);background:var(--surf);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.ctab{padding:8px 16px;font-size:10px;font-weight:500;color:var(--muted);border:none;background:transparent;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;font-family:var(--sans);white-space:nowrap;flex-shrink:0;}
.ctab.a{color:var(--ind2);border-bottom-color:var(--ind2);}
.ctab:hover:not(.a){color:var(--text);}

/* SLIDES */
.sarea{flex:1;overflow:hidden;position:relative;}
.slide{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;padding:30px 56px;text-align:center;animation:sIn .3s ease;}
.slide.a{display:flex;}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* TYPOGRAPHY */
.tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:rgba(129,140,248,.15);color:var(--ind2);margin-bottom:12px;}
.stitle{font-family:var(--serif);font-size:clamp(28px,4vw,52px);line-height:1.15;margin-bottom:10px;}
.ssub{font-size:clamp(12px,1.4vw,15px);color:var(--muted);max-width:700px;line-height:1.75;}
.ac{color:var(--ind2);} .tc{color:var(--teal);} .cc{color:var(--coral);} .am{color:var(--amber);} .gc{color:var(--green);} .bc{color:var(--blue);} .pc{color:var(--purple);}

/* CARDS */
.grid{display:grid;gap:12px;width:100%;max-width:920px;margin-top:18px;}
.g2{grid-template-columns:1fr 1fr;} .g3{grid-template-columns:1fr 1fr 1fr;} .g4{grid-template-columns:1fr 1fr 1fr 1fr;}
.card{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:16px 18px;text-align:left;transition:border-color .2s;}
.card:hover{border-color:rgba(129,140,248,.3);}
.card.a{border-color:rgba(129,140,248,.4);background:rgba(129,140,248,.06);}
.card.t{border-color:rgba(45,212,191,.4);background:rgba(45,212,191,.05);}
.card.c{border-color:rgba(251,113,133,.4);background:rgba(251,113,133,.05);}
.card.b{border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.05);}
.card.y{border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.05);}
.card.g{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.05);}
.card.p{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.05);}
.ct{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
.cb{font-size:11.5px;color:var(--muted);line-height:1.65;}

/* FORMULA */
.fbox{background:var(--surf2);border:1px solid rgba(129,140,248,.4);border-radius:10px;padding:14px 22px;font-size:clamp(14px,1.8vw,20px);font-family:'Courier New',monospace;color:var(--ind2);max-width:660px;margin:12px auto;letter-spacing:.02em;}
.fparts{display:flex;gap:14px;max-width:820px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
.fp{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:center;min-width:130px;}
.fpv{font-size:17px;font-weight:600;font-family:monospace;margin-bottom:3px;}
.fpl{font-size:10px;color:var(--muted);}

/* TABLE */
.twrap{max-width:840px;width:100%;margin-top:16px;border-radius:9px;overflow:hidden;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead{background:rgba(129,140,248,.2);}
thead th{padding:9px 12px;font-weight:600;color:var(--ind2);text-align:center;font-size:10px;letter-spacing:.07em;text-transform:uppercase;}
tbody tr{border-top:1px solid var(--border);transition:background .15s;}
tbody tr:hover{background:rgba(255,255,255,.03);}
tbody td{padding:8px 12px;text-align:center;color:var(--muted);}
tbody td:first-child{color:var(--text);font-weight:500;text-align:left;}
.tp{color:var(--green)!important;} .tn{color:var(--coral)!important;} .tk{color:var(--amber)!important;font-weight:600;}

/* STEPS */
.steps{list-style:none;max-width:740px;width:100%;margin-top:16px;text-align:left;}
.steps li{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.steps li:last-child{border-bottom:none;}
.sn{min-width:28px;height:28px;border-radius:50%;background:rgba(129,140,248,.2);color:var(--ind2);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.st{font-weight:600;color:var(--text);font-size:12.5px;}
.sd{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.6;}

/* TWO COL */
.twoc{display:flex;gap:18px;max-width:900px;width:100%;margin-top:16px;align-items:flex-start;}
.cl{flex:1;text-align:left;} .cr{flex:1;text-align:left;}

/* INTERACTIVE CANVAS */
canvas.mc{border-radius:9px;background:var(--surf);border:1px solid var(--border);}
.ctrls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;}
.ctrl-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
input[type=range]{accent-color:var(--ind);cursor:pointer;}
.stat-row{display:flex;gap:10px;margin-top:8px;}
.stat{background:var(--surf2);border-radius:6px;padding:7px 12px;text-align:center;}
.stat-l{font-size:9px;color:var(--muted);}
.stat-v{font-size:15px;font-weight:600;font-family:monospace;}

/* BIAS-VARIANCE INTERACTIVE */
.bv-wrap{display:flex;gap:18px;max-width:900px;width:100%;margin-top:14px;}
.bv-info{min-width:200px;display:flex;flex-direction:column;gap:10px;}
.bv-bar-wrap{flex:1;position:relative;}

/* THUMB NAV */
.tnav{display:flex;gap:4px;padding:7px 20px;overflow-x:auto;border-top:1px solid var(--border);background:var(--surf);flex-shrink:0;scrollbar-width:none;}
.thumb{min-width:44px;height:26px;border-radius:4px;border:1px solid var(--border);background:var(--surf2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);flex-shrink:0;transition:all .15s;font-family:var(--sans);}
.thumb.a{border-color:var(--ind2);color:var(--ind2);background:rgba(129,140,248,.12);}
.thumb:hover:not(.a){border-color:rgba(255,255,255,.2);color:var(--text);}
.kb-hint{position:fixed;bottom:46px;right:14px;font-size:9px;color:var(--muted);display:flex;gap:5px;z-index:50;}
.kb{background:var(--surf2);border:1px solid var(--border);border-radius:3px;padding:2px 5px;}
</style>

{ch:0,lbl:'What is SL',html:`
<div class="tag">Chapter 1 · Introduction</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">What is Statistical Learning?</h2>
<p class="ssub">Statistical learning = a set of tools for understanding and making sense of data. Two big families:</p>
<div class="grid g2" style="margin-top:16px;max-width:820px;">
  <div class="card a">
    <div class="ct ac">Supervised Learning</div>
    <div class="cb" style="margin-top:6px;">We have <b style="color:var(--text)">both inputs AND outputs</b>. We build a model to predict the output from the inputs.<br><br>Examples: predict salary from age + education; predict if a patient will default on a loan.</div>
  </div>
  <div class="card t">
    <div class="ct tc">Unsupervised Learning</div>
    <div class="cb" style="margin-top:6px;">We have <b style="color:var(--text)">inputs only — no output</b>. We look for patterns, groups, or structure hidden in the data.<br><br>Examples: group cancer cell lines by gene expression; segment customers into types.</div>
  </div>
</div>
<div class="grid g3" style="margin-top:12px;max-width:820px;">
  <div class="card"><div class="ct">Wage data</div><div class="cb">Supervised regression — predict a person's salary from age, year, and education.</div></div>
  <div class="card"><div class="ct">Stock market data</div><div class="cb">Supervised classification — predict if the S&P 500 goes Up or Down tomorrow.</div></div>
  <div class="card"><div class="ct">Gene expression</div><div class="cb">Unsupervised clustering — group 64 cancer cell lines by similarity without prior labels.</div></div>
</div>`},

{ch:0,lbl:'Regression vs Class',html:`
<div class="tag">Chapter 1 · Introduction</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Regression vs Classification</h2>
<div class="twoc" style="max-width:820px;margin-top:16px;">
  <div class="cl">
    <div class="card c" style="margin-bottom:12px;">
      <div class="ct cc" style="font-size:15px;">Regression</div>
      <div class="cb" style="margin-top:8px;">The output Y is a <b style="color:var(--text)">number</b> (quantitative).<br><br>Examples: salary in dollars, house price, temperature, stock return percentage.<br><br>Methods: Linear regression, polynomial regression, ridge, lasso.</div>
    </div>
  </div>
  <div class="cr">
    <div class="card a" style="margin-bottom:12px;">
      <div class="ct ac" style="font-size:15px;">Classification</div>
      <div class="cb" style="margin-top:8px;">The output Y is a <b style="color:var(--text)">category</b> (qualitative).<br><br>Examples: spam/not spam, up/down, cancer type, default yes/no.<br><br>Methods: Logistic regression, LDA, KNN, decision trees.</div>
    </div>
  </div>
</div>
<div class="card" style="max-width:820px;text-align:left;">
  <div class="ct">Why does it matter?</div>
  <div class="cb" style="margin-top:6px;">The type of output determines which methods you can use. You can't predict a category with a straight line the same way you'd predict a number — different math is needed. Knowing this distinction is step one in any machine learning project.</div>
</div>`},

{ch:0,lbl:'Brief History',html:`
<div class="tag">Chapter 1 · A Brief History</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">How Statistical Learning Grew</h2>
<ul class="steps">
  <li><div class="sn">1800s</div><div><div class="st">Least squares (linear regression)</div><div class="sd">The earliest form of statistical learning. First applied to problems in astronomy to predict planetary positions.</div></div></li>
  <li><div class="sn">1936</div><div><div class="st">Linear Discriminant Analysis (LDA)</div><div class="sd">Proposed to predict qualitative outcomes — e.g., does a patient survive or die?</div></div></li>
  <li><div class="sn">1940s</div><div><div class="st">Logistic Regression</div><div class="sd">An alternative approach for classification — still one of the most widely used methods today.</div></div></li>
  <li><div class="sn">1980s</div><div><div class="st">Non-linear methods take off</div><div class="sd">Computing power grew enough to fit complex models. Classification trees, generalized additive models, and neural networks emerged.</div></div></li>
  <li><div class="sn">1990s</div><div><div class="st">Support Vector Machines</div><div class="sd">A powerful approach for classification. Also when non-statisticians started using statistical learning widely.</div></div></li>
  <li><div class="sn">Today</div><div><div class="st">Python + open-source tools</div><div class="sd">Statistical learning is now accessible to everyone — data scientists, biologists, economists, and more — through libraries like scikit-learn.</div></div></li>
</ul>`},

{ch:0,lbl:'Notation',html:`
<div class="tag">Chapter 1 · Notation</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Key Notation in the Book</h2>
<p class="ssub" style="margin-bottom:4px;">Understanding the symbols makes everything easier. Here are the core ones.</p>
<div class="twrap">
  <table>
    <thead><tr><th>Symbol</th><th>What it means</th><th>Example</th></tr></thead>
    <tbody>
      <tr><td style="font-family:monospace;color:var(--ind2)">n</td><td>Number of observations (rows) in data</td><td>3,000 people in the Wage dataset</td></tr>
      <tr><td style="font-family:monospace;color:var(--ind2)">p</td><td>Number of variables (columns)</td><td>11 variables: age, year, education…</td></tr>
      <tr><td style="font-family:monospace;color:var(--ind2)">xᵢⱼ</td><td>Value of variable j for observation i</td><td>The age of person 7</td></tr>
      <tr><td style="font-family:monospace;color:var(--teal)">X</td><td>The full data matrix (n rows × p columns)</td><td>A spreadsheet of all data</td></tr>
      <tr><td style="font-family:monospace;color:var(--coral)">Y</td><td>The response (output) variable we predict</td><td>Wage in dollars</td></tr>
      <tr><td style="font-family:monospace;color:var(--amber)">ŷ</td><td>Our predicted value for Y (y-hat)</td><td>Our model's salary estimate</td></tr>
      <tr><td style="font-family:monospace;color:var(--green)">f</td><td>The true unknown function mapping X → Y</td><td>The real relationship between age and wage</td></tr>
    </tbody>
  </table>
</div>
<p class="ssub" style="font-size:11px;margin-top:10px;">Think of X as a spreadsheet, Y as a target column, and f as the hidden rule that connects them. Our job: estimate f as accurately as possible.</p>`},

{ch:0,lbl:'Ch1 Recap',html:`
<div class="tag">Chapter 1 · Summary</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Chapter 1 in One Page</h2>
<div class="grid g3" style="margin-top:18px;max-width:860px;">
  <div class="card a"><div class="ct">Statistical learning</div><div class="cb">Tools for understanding data. Supervised (predict an output) vs unsupervised (find structure without labels).</div></div>
  <div class="card t"><div class="ct">Three real examples</div><div class="cb">Wage (regression), Stock market (classification), Gene expression (clustering). Each demonstrates a different type of problem.</div></div>
  <div class="card c"><div class="ct">Regression problems</div><div class="cb">Output is a continuous number. Predict salary, price, temperature. Use when Y is quantitative.</div></div>
  <div class="card b"><div class="ct">Classification problems</div><div class="cb">Output is a category. Predict Up/Down, Yes/No, cancer type. Use when Y is qualitative.</div></div>
  <div class="card y"><div class="ct">History matters</div><div class="cb">From least squares (1800s) to deep learning (today). The field builds on centuries of statistical thinking.</div></div>
  <div class="card p"><div class="ct">This book's goal</div><div class="cb">Understand the methods intuitively. Know which tool to use when. Apply using Python — no advanced math required.</div></div>
</div>`},

// CH2 ─────────────────────────────────────
{ch:1,lbl:'Why Estimate f',html:`
<div class="tag">Chapter 2 · Statistical Learning</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,46px);">The Core Idea: Estimating <span class="ac">f</span></h2>
<p class="ssub">Every statistical learning method tries to estimate the unknown function f that connects our inputs X to our output Y:</p>
<div class="fbox">Y = f(X) + ε</div>
<div class="grid g2" style="margin-top:12px;max-width:820px;">
  <div class="card a">
    <div class="ct">Prediction</div>
    <div class="cb" style="margin-top:6px;">We don't care what f looks like — we just want accurate predictions Ŷ = f̂(X). <b style="color:var(--text)">f is a black box</b>.<br><br>Example: predict drug reaction risk from blood test results.</div>
  </div>
  <div class="card t">
    <div class="ct">Inference</div>
    <div class="cb" style="margin-top:6px;">We want to understand f — which predictors matter? How does each one affect Y? <b style="color:var(--text)">f must be interpretable</b>.<br><br>Example: which advertising channels drive the most sales?</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Two types of error — and only one is fixable</div>
  <div class="cb" style="margin-top:6px;line-height:1.9;"><span style="color:var(--green)">Reducible error:</span> Comes from imperfect estimation of f. We can improve this with better models.<br><span style="color:var(--coral)">Irreducible error (ε):</span> Random noise in the world. Even the perfect f can't eliminate it.</div>
</div>`},

{ch:1,lbl:'Param vs Non-Param',html:`
<div class="tag">Chapter 2 · How We Estimate f</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Parametric vs Non-Parametric</h2>
<div class="twoc" style="max-width:840px;margin-top:16px;">
  <div class="cl">
    <div class="card a" style="margin-bottom:12px;">
      <div class="ct ac" style="font-size:14px;">Parametric Methods</div>
      <div class="cb" style="margin-top:8px;line-height:1.8;">1. <b style="color:var(--text)">Assume a shape</b> for f (e.g., "f is a straight line").<br>2. <b style="color:var(--text)">Estimate the parameters</b> (e.g., the slope and intercept).<br><br>Simpler. Fewer things to estimate. Risk: if the assumed shape is wrong, you get a bad model.</div>
    </div>
    <div class="fbox" style="font-size:14px;margin:0;">f(X) = β₀ + β₁X₁ + β₂X₂ + … + βₚXₚ</div>
  </div>
  <div class="cr">
    <div class="card t">
      <div class="ct tc" style="font-size:14px;">Non-Parametric Methods</div>
      <div class="cb" style="margin-top:8px;line-height:1.8;">No assumed shape — f can be <b style="color:var(--text)">any form that fits the data</b>.<br><br>More flexible. Can capture complex patterns. Risk: needs a LOT of data and can overfit (memorise noise).<br><br>Example: K-nearest neighbors.</div>
    </div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">The key trade-off</div>
  <div class="cb" style="margin-top:5px;">More flexible = lower bias (fits data better), but higher variance (changes a lot with different samples). Less flexible = higher bias, lower variance. Choosing the right flexibility is a central challenge in all of machine learning.</div>
</div>`},

{ch:1,lbl:'Bias-Variance',html:`
<div class="tag">Chapter 2 · Model Accuracy</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">The Bias–Variance Trade-Off</h2>
<p class="ssub" style="margin-bottom:4px;">Every model's error = Bias² + Variance + Irreducible noise. You can't minimise all three at once.</p>
<div class="grid g3" style="margin-top:14px;max-width:820px;">
  <div class="card c">
    <div class="ct cc">Bias</div>
    <div class="cb" style="margin-top:6px;">Error from wrong assumptions. A simple straight line fit to complex curved data = high bias. The model misses the true pattern.</div>
    <div style="font-size:11px;color:var(--coral);margin-top:8px;font-family:monospace;">Too simple → underfitting</div>
  </div>
  <div class="card a">
    <div class="ct ac">Variance</div>
    <div class="cb" style="margin-top:6px;">How much the model changes when you train it on different data. A very flexible model wiggles too much and memorises noise.</div>
    <div style="font-size:11px;color:var(--ind2);margin-top:8px;font-family:monospace;">Too complex → overfitting</div>
  </div>
  <div class="card t">
    <div class="ct tc">Sweet spot</div>
    <div class="cb" style="margin-top:6px;">The ideal model is complex enough to capture the real pattern, but not so complex it memorises noise. Found using test error or cross-validation.</div>
    <div style="font-size:11px;color:var(--teal);margin-top:8px;font-family:monospace;">Just right → generalises well</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Training error vs Test error</div>
  <div class="cb" style="margin-top:5px;line-height:1.8;"><span style="color:var(--coral)">Training error</span> always goes down as the model gets more complex. It's easy to memorise your own data.<br><span style="color:var(--green)">Test error</span> (on new, unseen data) goes down then back up — the U-shaped curve. The bottom of that U is the goal.</div>
</div>`},

{ch:1,lbl:'MSE & KNN',html:`
<div class="tag">Chapter 2 · Measuring Fit</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">How Do We Measure Model Accuracy?</h2>
<div class="grid g2" style="margin-top:16px;max-width:820px;">
  <div class="card y">
    <div class="ct am">Mean Squared Error (MSE)</div>
    <div class="fbox" style="font-size:14px;margin:10px 0;">MSE = (1/n) Σ(yᵢ − ŷᵢ)²</div>
    <div class="cb">Average squared difference between actual and predicted values. Smaller is better. Squaring penalises big mistakes more than small ones.</div>
  </div>
  <div class="card b">
    <div class="ct bc">K-Nearest Neighbors (KNN)</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">A simple non-parametric method. To predict for a new point:<br>1. Find the K closest training points.<br>2. Average their Y values (regression) or take the majority class (classification).<br><br><b style="color:var(--text)">Small K</b> = very flexible, high variance. <b style="color:var(--text)">Large K</b> = smoother, more biased.</div>
  </div>
</div>
<div class="grid g3" style="margin-top:12px;max-width:820px;">
  <div class="card"><div class="ct">Bayes Error Rate</div><div class="cb">The theoretical minimum test error for classification — the irreducible noise floor. Real classifiers can only approach it.</div></div>
  <div class="card a"><div class="ct">Error rate (classification)</div><div class="cb">Fraction of observations misclassified. The classification equivalent of MSE. Lower is better.</div></div>
  <div class="card t"><div class="ct">Flexibility vs accuracy</div><div class="cb">Higher flexibility ↓ training error but may ↑ test error. Always evaluate on data the model has never seen.</div></div>
</div>`},

{ch:1,lbl:'Supervised vs Unsupervised',html:`
<div class="tag">Chapter 2 · Types of Learning</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Supervised vs Unsupervised Learning</h2>
<div class="twoc" style="max-width:840px;margin-top:16px;">
  <div class="cl">
    <div class="card a">
      <div class="ct" style="font-size:15px;color:var(--ind2);">Supervised Learning</div>
      <div class="cb" style="margin-top:8px;line-height:1.9;">Every observation has <b style="color:var(--text)">a label (Y)</b>.<br>We train the model to map X → Y.<br><br>Algorithms: Linear regression, Logistic regression, Decision trees, SVM, Neural networks.<br><br>Goal: Accurate prediction or inference on new data.</div>
    </div>
  </div>
  <div class="cr">
    <div class="card t">
      <div class="ct" style="font-size:15px;color:var(--teal);">Unsupervised Learning</div>
      <div class="cb" style="margin-top:8px;line-height:1.9;">Observations have <b style="color:var(--text)">no output label</b>.<br>We discover hidden structure.<br><br>Algorithms: K-means clustering, Hierarchical clustering, PCA.<br><br>Goal: Find groups, reduce dimensions, understand patterns.</div>
    </div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Why unsupervised is harder</div>
  <div class="cb" style="margin-top:5px;">With supervised learning, we can check our predictions against known answers. With unsupervised, there is no "right answer" to compare against — evaluation is much more subjective and problem-specific.</div>
</div>`},

{ch:1,lbl:'Ch2 Recap',html:`
<div class="tag">Chapter 2 · Summary</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Chapter 2 in One Page</h2>
<div class="grid g3" style="margin-top:16px;max-width:860px;">
  <div class="card a"><div class="ct">Y = f(X) + ε</div><div class="cb">Statistical learning = estimating the unknown f. ε is irreducible noise we can never remove.</div></div>
  <div class="card t"><div class="ct">Two goals</div><div class="cb">Prediction (black-box f, accurate Ŷ) vs Inference (interpretable f, understand which X matters).</div></div>
  <div class="card c"><div class="ct">Parametric vs non-parametric</div><div class="cb">Parametric assumes a shape (fewer estimates needed). Non-parametric is flexible (needs more data).</div></div>
  <div class="card b"><div class="ct">Bias-Variance trade-off</div><div class="cb">Simple models have high bias, low variance. Complex models have low bias, high variance. Find the sweet spot.</div></div>
  <div class="card y"><div class="ct">Training ≠ Test error</div><div class="cb">A model that fits training data perfectly can fail on new data. Always measure test error (or use cross-validation).</div></div>
  <div class="card p"><div class="ct">KNN</div><div class="cb">Simplest non-parametric method. K=1 is most flexible. K=large is smoothest. Choose K using validation.</div></div>
</div>`},

// CH3 ─────────────────────────────────────
{ch:2,lbl:'Simple Lin Reg',html:`
<div class="tag">Chapter 3 · Linear Regression</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,48px);">Simple Linear Regression</h2>
<p class="ssub" style="margin-bottom:4px;">One predictor, one response. The simplest way to model a linear relationship.</p>
<div class="fbox">Ŷ = β₀ + β₁X</div>
<div class="fparts">
  <div class="fp"><div class="fpv" style="color:var(--teal)">β₀</div><div class="fpl">Intercept — Y when X = 0</div></div>
  <div class="fp"><div class="fpv" style="color:var(--coral)">β₁</div><div class="fpl">Slope — change in Y per unit X</div></div>
  <div class="fp"><div class="fpv" style="color:var(--amber)">RSS</div><div class="fpl">Residual Sum of Squares — what we minimise</div></div>
  <div class="fp"><div class="fpv" style="color:var(--green)">R²</div><div class="fpl">Fraction of variance explained (0–1)</div></div>
</div>
<div class="grid g2" style="margin-top:12px;max-width:820px;">
  <div class="card">
    <div class="ct">How β̂₁ is estimated</div>
    <div class="fbox" style="font-size:12px;margin:8px 0;">β̂₁ = Σ(xᵢ−x̄)(yᵢ−ȳ) / Σ(xᵢ−x̄)²</div>
    <div class="cb">This is just Cov(X,Y) / Var(X) — how much X and Y move together, scaled by X's spread.</div>
  </div>
  <div class="card a">
    <div class="ct">Advertising example</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">TV budget vs sales. β̂₁ = 0.0475 means: every extra $1,000 spent on TV ads → ~47.5 more units sold.<br><br>p-value &lt; 0.0001 → very strong evidence the relationship is real.</div>
  </div>
</div>`},

{ch:2,lbl:'Assessing Accuracy',html:`
<div class="tag">Chapter 3 · Model Accuracy</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Is the Model Any Good?</h2>
<ul class="steps">
  <li><div class="sn">1</div><div><div class="st">Residual Standard Error (RSE)</div><div class="sd">Average size of the residuals — how far off our predictions are, in the original units. RSE = √(RSS/(n−2)). Lower is better. For Advertising: RSE = 3.26 thousand units.</div></div></li>
  <li><div class="sn">2</div><div><div class="st">R² Statistic</div><div class="sd">Proportion of variance in Y explained by the model. Always between 0 and 1. R² = 0.61 means our TV model explains 61% of the variation in sales. Higher is better.</div></div></li>
  <li><div class="sn">3</div><div><div class="st">p-value and t-statistic</div><div class="sd">Test whether β₁ is truly different from zero. t = β̂₁ / SE(β̂₁). Small p-value → strong evidence of a real relationship. Use cutoffs of 0.05 or 0.01.</div></div></li>
  <li><div class="sn">4</div><div><div class="st">Confidence intervals</div><div class="sd">A range that contains the true β with 95% probability. For TV: β̂₁ ± 2·SE(β̂₁) = [0.042, 0.053]. Each $1K in TV ads → 42 to 53 more units sold.</div></div></li>
</ul>`},

{ch:2,lbl:'Multiple Reg',html:`
<div class="tag">Chapter 3 · Multiple Regression</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,46px);">Multiple Linear Regression</h2>
<p class="ssub" style="margin-bottom:4px;">More than one predictor. The same idea, extended.</p>
<div class="fbox">Ŷ = β₀ + β₁X₁ + β₂X₂ + … + βₚXₚ</div>
<div class="grid g2" style="margin-top:12px;max-width:820px;">
  <div class="card a">
    <div class="ct">F-statistic — overall significance test</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Tests: Is at least one predictor useful?<br>H₀: β₁ = β₂ = … = βₚ = 0 (none help).<br>Large F-statistic + small p-value → reject H₀ → model is useful.<br><br>For Advertising (TV + Radio + Newspaper): F = 570, p ≈ 0.</div>
  </div>
  <div class="card t">
    <div class="ct">Variable selection</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Not all predictors are useful. Options:<br>• Forward selection: add one at a time<br>• Backward selection: remove one at a time<br>• Mixed: add and remove as needed<br><br>Key: adding a predictor always reduces RSS. Use adjusted R² or AIC to penalise complexity.</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Qualitative predictors (dummy variables)</div>
  <div class="cb" style="margin-top:5px;">Categories become 0/1 indicator variables. If you have 3 groups (A, B, C), you need 2 dummy variables — one is always the "baseline" that the others are compared against.</div>
</div>`},

{ch:2,lbl:'Potential Problems',html:`
<div class="tag">Chapter 3 · Potential Problems</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">6 Things That Can Go Wrong</h2>
<div class="grid g3" style="margin-top:16px;max-width:900px;">
  <div class="card c"><div class="ct">1. Non-linearity</div><div class="cb">Residual plots with a curved pattern → the relationship isn't linear. Fix: add polynomial terms or use a non-linear model.</div></div>
  <div class="card a"><div class="ct">2. Correlated errors</div><div class="cb">Errors that follow a pattern (e.g., time series). Violates assumptions. Results in overconfident p-values.</div></div>
  <div class="card b"><div class="ct">3. Non-constant variance</div><div class="cb">Residuals get larger as Ŷ grows (funnel shape). Fix: log-transform Y or use weighted least squares.</div></div>
  <div class="card y"><div class="ct">4. Outliers</div><div class="cb">Points with very large residuals. Can distort R² and RSE. Check using studentised residuals (&gt;3 = suspicious).</div></div>
  <div class="card p"><div class="ct">5. High-leverage points</div><div class="cb">Unusual X values that can strongly pull the regression line. Even if not outliers, they may have outsized influence.</div></div>
  <div class="card t"><div class="ct">6. Collinearity</div><div class="cb">Two predictors that are highly correlated. Makes it hard to tell which one matters. Check with Variance Inflation Factor (VIF). VIF &gt; 5 or 10 is a red flag.</div></div>
</div>`},

{ch:2,lbl:'Interaction & KNN',html:`
<div class="tag">Chapter 3 · Extensions</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Interaction Terms & KNN Regression</h2>
<div class="twoc" style="max-width:840px;margin-top:16px;">
  <div class="cl">
    <div class="card a">
      <div class="ct ac">Interaction Effects</div>
      <div class="cb" style="margin-top:8px;line-height:1.8;">Sometimes the effect of X₁ on Y depends on X₂. We add a product term:<br>
      <div class="fbox" style="font-size:12px;margin:8px 0;">Ŷ = β₀ + β₁X₁ + β₂X₂ + β₃X₁X₂</div>
      Example: TV and Radio ads together produce more sales than either alone — they <em>synergise</em>. β₃ &gt; 0 means positive interaction.</div>
    </div>
  </div>
  <div class="cr">
    <div class="card t">
      <div class="ct tc">KNN vs Linear Regression</div>
      <div class="cb" style="margin-top:8px;line-height:1.8;">KNN regression makes no assumptions about the shape of f — more flexible.<br><br>But: with many predictors (large p), KNN needs exponentially more data to work well. This is the <b style="color:var(--text)">curse of dimensionality</b>.<br><br>Linear regression often outperforms KNN when p is large relative to n.</div>
    </div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Hierarchy principle</div>
  <div class="cb" style="margin-top:5px;">If you include an interaction term X₁X₂, always include the main effects X₁ and X₂ too — even if their individual p-values aren't significant.</div>
</div>`},

{ch:2,lbl:'Ch3 Recap',html:`
<div class="tag">Chapter 3 · Summary</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Chapter 3 in One Page</h2>
<div class="grid g3" style="margin-top:16px;max-width:860px;">
  <div class="card a"><div class="ct">Simple linear regression</div><div class="cb">Ŷ = β₀ + β₁X. Fit by minimising RSS. Assess with RSE, R², p-values, and confidence intervals.</div></div>
  <div class="card t"><div class="ct">Multiple regression</div><div class="cb">Add more predictors. Use F-statistic to test overall significance. Use AIC/BIC to select variables.</div></div>
  <div class="card c"><div class="ct">Qualitative predictors</div><div class="cb">Create dummy (0/1) variables. K categories → K−1 dummies. One group becomes the baseline.</div></div>
  <div class="card b"><div class="ct">Interaction terms</div><div class="cb">When effect of one predictor depends on another, add their product. Always include main effects too.</div></div>
  <div class="card y"><div class="ct">Diagnostic checks</div><div class="cb">Look for non-linearity, outliers, high leverage, collinearity. Residual plots are your first tool.</div></div>
  <div class="card p"><div class="ct">R² vs adjusted R²</div><div class="cb">R² always increases as you add predictors. Adjusted R² penalises for unnecessary variables. Use it for model comparison.</div></div>
</div>`},

// CH4 ─────────────────────────────────────
{ch:3,lbl:'Why Classify',html:`
<div class="tag">Chapter 4 · Classification</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,46px);">Why Not Just Use Linear Regression?</h2>
<div class="grid g2" style="margin-top:16px;max-width:820px;">
  <div class="card c">
    <div class="ct cc">Problem 1: More than 2 classes</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">If Y can be stroke, drug overdose, or epileptic seizure, coding them as 1, 2, 3 implies a meaningless order. Swapping the codes gives completely different predictions. Linear regression doesn't handle this naturally.</div>
  </div>
  <div class="card y">
    <div class="ct am">Problem 2: Probabilities out of range</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Even with 2 classes (0/1), linear regression can predict values below 0 or above 1. These can't be interpreted as probabilities. We need a method that always outputs values in [0, 1].</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">The solution: purpose-built classification methods</div>
  <div class="cb" style="margin-top:6px;line-height:1.9;"><b style="color:var(--ind2)">Logistic Regression</b> — models the probability of a binary outcome (Chapter 4).<br><b style="color:var(--teal)">LDA & QDA</b> — model each class distribution separately, then classify.<br><b style="color:var(--coral)">KNN for classification</b> — majority vote among k nearest neighbors.<br><b style="color:var(--amber)">Naive Bayes</b> — uses Bayes' theorem with conditional independence.</div>
</div>`},

{ch:3,lbl:'Logistic Regression',html:`
<div class="tag">Chapter 4 · Logistic Regression</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,46px);">Logistic Regression</h2>
<p class="ssub" style="margin-bottom:4px;">Instead of predicting Y directly, we model the probability that Y = 1.</p>
<div class="fbox">p(X) = e^(β₀+β₁X) / (1 + e^(β₀+β₁X))</div>
<div class="grid g3" style="margin-top:12px;max-width:820px;">
  <div class="card a">
    <div class="ct">The logistic function</div>
    <div class="cb">Always outputs a value between 0 and 1. S-shaped curve. Maps any input to a probability.</div>
  </div>
  <div class="card t">
    <div class="ct">Log-odds (logit)</div>
    <div class="fbox" style="font-size:12px;margin:6px 0;">log(p/(1−p)) = β₀ + β₁X</div>
    <div class="cb">The log-odds is linear in X. A one-unit increase in X changes the log-odds by β₁.</div>
  </div>
  <div class="card c">
    <div class="ct">Making predictions</div>
    <div class="cb">If p̂(X) ≥ 0.5 → predict class "Yes". Otherwise → "No". The threshold can be adjusted based on cost of errors.</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Credit card default example</div>
  <div class="cb" style="margin-top:5px;">Predicting default (Yes/No) from credit card balance. β̂₁ = 0.0055 → a $1 increase in balance increases the log-odds of default by 0.0055. At balance = $1,000, p(default) ≈ 0.00576 (very low).</div>
</div>`},

{ch:3,lbl:'LDA & QDA',html:`
<div class="tag">Chapter 4 · Generative Models</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">LDA, QDA, and Naive Bayes</h2>
<ul class="steps">
  <li><div class="sn">LDA</div><div><div class="st">Linear Discriminant Analysis</div><div class="sd">Assumes each class has a normal distribution with the same covariance matrix. Creates a linear decision boundary. Good when classes are roughly normally distributed and you have limited data.</div></div></li>
  <li><div class="sn">QDA</div><div><div class="st">Quadratic Discriminant Analysis</div><div class="sd">Like LDA, but allows each class to have its own covariance matrix. Creates a curved (quadratic) decision boundary. More flexible than LDA — needs more data to estimate.</div></div></li>
  <li><div class="sn">NB</div><div><div class="st">Naive Bayes</div><div class="sd">Assumes features are independent within each class. Simple and surprisingly effective. Works well with small datasets and high dimensions. Called "naive" because the independence assumption is often violated.</div></div></li>
  <li><div class="sn">Key</div><div><div class="st">Bayes' Theorem connects all three</div><div class="sd">P(Y=k | X) ∝ P(X | Y=k) × P(Y=k). We model the class distributions, then use Bayes' theorem to convert to class probabilities.</div></div></li>
</ul>`},

{ch:3,lbl:'Comparison',html:`
<div class="tag">Chapter 4 · Method Comparison</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Which Classifier to Choose?</h2>
<div class="twrap">
  <table>
    <thead><tr><th>Method</th><th>Decision boundary</th><th>Assumptions</th><th>Best when…</th></tr></thead>
    <tbody>
      <tr><td>Logistic Regression</td><td class="tp">Linear</td><td>No distribution assumption</td><td>Binary outcome, few predictors</td></tr>
      <tr><td>LDA</td><td class="tp">Linear</td><td>Normal + equal covariance</td><td>Small n, multiple classes</td></tr>
      <tr><td>QDA</td><td class="tp">Quadratic</td><td>Normal + different covariance</td><td>Enough data, flexible boundary needed</td></tr>
      <tr><td>Naive Bayes</td><td class="tp">Varies</td><td>Feature independence</td><td>Very high-dimensional data</td></tr>
      <tr><td>KNN</td><td class="tn">Non-linear</td><td>None</td><td>Complex boundary, enough data</td></tr>
    </tbody>
  </table>
</div>
<div class="grid g2" style="margin-top:12px;max-width:820px;">
  <div class="card a"><div class="ct">Confusion matrix</div><div class="cb">True Positives, False Positives, True Negatives, False Negatives. Sensitivity = TP/(TP+FN). Specificity = TN/(TN+FP). Trade-off by adjusting the threshold.</div></div>
  <div class="card t"><div class="ct">Poisson Regression</div><div class="cb">For count data (e.g., number of bikes rented per hour). Models log(λ) as linear in X. λ is the expected count. Part of the Generalized Linear Model family.</div></div>
</div>`},

{ch:3,lbl:'Ch4 Recap',html:`
<div class="tag">Chapter 4 · Summary</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Chapter 4 in One Page</h2>
<div class="grid g3" style="margin-top:16px;max-width:860px;">
  <div class="card c"><div class="ct">Why not linear regression?</div><div class="cb">Can't handle 3+ classes naturally. Predictions can be outside [0,1]. Use purpose-built classifiers instead.</div></div>
  <div class="card a"><div class="ct">Logistic regression</div><div class="cb">Models P(Y=1|X) using the S-shaped logistic function. Always between 0 and 1. Fit using maximum likelihood.</div></div>
  <div class="card t"><div class="ct">LDA</div><div class="cb">Assumes normal distributions. Linear boundary. Great for small samples or when classes are well-separated.</div></div>
  <div class="card b"><div class="ct">QDA</div><div class="cb">Like LDA but flexible. Each class has its own covariance. Quadratic boundary. Needs more data than LDA.</div></div>
  <div class="card y"><div class="ct">Naive Bayes</div><div class="cb">Assumes feature independence. Fast, simple, effective in high dimensions despite the independence assumption.</div></div>
  <div class="card p"><div class="ct">Choosing a method</div><div class="cb">No single best classifier. Try several, use cross-validation to compare. Consider the type of decision boundary needed.</div></div>
</div>`},

// CH5 ─────────────────────────────────────
{ch:4,lbl:'Why Resample',html:`
<div class="tag">Chapter 5 · Resampling Methods</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,46px);">Why Resampling?</h2>
<p class="ssub">Resampling = repeatedly draw samples from training data and refit the model to learn something new.</p>
<div class="grid g2" style="margin-top:16px;max-width:820px;">
  <div class="card a">
    <div class="ct ac">The core problem</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Training error <b style="color:var(--text)">always underestimates</b> test error. A model can memorise training data and fail on new data.<br><br>We need to estimate how well the model will perform on <em>unseen</em> data — without having a separate test set.</div>
  </div>
  <div class="card t">
    <div class="ct tc">Two main approaches</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;"><b style="color:var(--text)">Cross-Validation</b><br>Hold out a piece of training data to estimate test error. Repeat for different subsets.<br><br><b style="color:var(--text)">Bootstrap</b><br>Repeatedly sample with replacement to estimate the variability of a statistic.</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Two uses for these estimates</div>
  <div class="cb" style="margin-top:5px;line-height:1.9;"><b style="color:var(--green)">Model assessment:</b> How accurate is this model on new data?<br><b style="color:var(--amber)">Model selection:</b> Which level of complexity (e.g., polynomial degree) gives the lowest test error?</div>
</div>`},

{ch:4,lbl:'Validation Set',html:`
<div class="tag">Chapter 5 · Cross-Validation</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">The Validation Set Approach</h2>
<div class="twoc" style="max-width:840px;margin-top:16px;">
  <div class="cl">
    <ul class="steps" style="margin-top:0;">
      <li><div class="sn">1</div><div><div class="st">Split the data randomly</div><div class="sd">~50% training set, ~50% validation (hold-out) set.</div></div></li>
      <li><div class="sn">2</div><div><div class="st">Fit the model on training</div><div class="sd">Never look at the validation set during fitting.</div></div></li>
      <li><div class="sn">3</div><div><div class="st">Evaluate on validation set</div><div class="sd">Compute MSE or error rate. This estimates the test error.</div></div></li>
    </ul>
  </div>
  <div class="cr">
    <div class="card c" style="margin-bottom:12px;">
      <div class="ct cc">Problem: high variance</div>
      <div class="cb" style="margin-top:6px;">Different random splits give very different MSE estimates. The result is unstable and depends heavily on which observations end up in which set.</div>
    </div>
    <div class="card y">
      <div class="ct am">Problem: wastes data</div>
      <div class="cb" style="margin-top:6px;">Only half the data is used for training. Models trained on less data tend to overestimate test error.</div>
    </div>
  </div>
</div>
<p class="ssub" style="font-size:12px;margin-top:12px;">Solution: use cross-validation, which makes smarter use of all available data.</p>`},

{ch:4,lbl:'Cross-Validation',html:`
<div class="tag">Chapter 5 · Cross-Validation</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">LOOCV and k-Fold CV</h2>
<div class="grid g2" style="margin-top:16px;max-width:820px;">
  <div class="card a">
    <div class="ct ac">Leave-One-Out CV (LOOCV)</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Leave out one observation, train on the rest, predict the left-out one. Repeat n times.<br><br><b style="color:var(--text)">CV error = (1/n) Σ MSEᵢ</b><br><br>Very low bias. But computationally expensive for large n, and can have high variance.</div>
  </div>
  <div class="card t">
    <div class="ct tc">k-Fold CV (k = 5 or 10)</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Randomly split data into k equal groups (folds). For each fold: train on remaining k−1 folds, test on this fold.<br><br>Average the k error estimates → final CV error.<br><br>Much faster than LOOCV. k=5 or 10 gives a good bias-variance balance.</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Using CV for model selection (Auto dataset example)</div>
  <div class="cb" style="margin-top:5px;line-height:1.9;">Test polynomial models of degree 1 through 10 predicting mpg from horsepower. CV error is lowest for degree 2 (quadratic). Adding degree 3 doesn't help — CV correctly identifies the optimal complexity.</div>
</div>`},

{ch:4,lbl:'Bootstrap',html:`
<div class="tag">Chapter 5 · The Bootstrap</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">The Bootstrap</h2>
<p class="ssub" style="margin-bottom:4px;">Estimate the variability of any statistic by repeatedly resampling your own data.</p>
<ul class="steps">
  <li><div class="sn">1</div><div><div class="st">Start with your original dataset of n observations</div><div class="sd">e.g., n = 100 stock returns to estimate the optimal portfolio allocation.</div></div></li>
  <li><div class="sn">2</div><div><div class="st">Sample n observations WITH replacement</div><div class="sd">Some observations appear multiple times. Some don't appear at all (~37% are not selected). This is one bootstrap sample.</div></div></li>
  <li><div class="sn">3</div><div><div class="st">Compute your statistic on this bootstrap sample</div><div class="sd">e.g., compute the estimated optimal α (portfolio weight). Call it α̂*₁.</div></div></li>
  <li><div class="sn">4</div><div><div class="st">Repeat B times (e.g., B = 1,000)</div><div class="sd">You now have B estimates: α̂*₁, α̂*₂, …, α̂*B. The standard deviation of these gives SE(α̂) — an estimate of variability.</div></div></li>
</ul>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Key insight</div>
  <div class="cb" style="margin-top:5px;">The bootstrap treats your sample as a stand-in for the population. Sampling from it mimics what would happen if you could repeatedly sample from the real world. No mathematical formulas needed — just computation.</div>
</div>`},

{ch:4,lbl:'CV for Classification',html:`
<div class="tag">Chapter 5 · Classification</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Resampling for Classification</h2>
<div class="grid g2" style="margin-top:16px;max-width:820px;">
  <div class="card a">
    <div class="ct">Same idea, different error measure</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">For regression: use MSE.<br>For classification: use <b style="color:var(--text)">error rate</b> (fraction misclassified).<br><br>k-fold CV divides the observations into k folds, computes the misclassification rate on each held-out fold, and averages them.</div>
  </div>
  <div class="card t">
    <div class="ct">Why it's useful</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Choose between KNN with K=1, K=5, K=20 — which K gives the best test error?<br><br>Use CV error, not training error! Training error with K=1 is always zero (KNN memorises training data perfectly).</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Practical tips</div>
  <div class="cb" style="margin-top:5px;line-height:1.9;">
    • Use <b style="color:var(--text)">k=5 or k=10</b> for k-fold CV in most situations.<br>
    • LOOCV is nearly unbiased but slow and has high variance — k=10 usually works better.<br>
    • Set a random seed before CV to make results reproducible.<br>
    • CV is computationally cheap compared to collecting new test data.
  </div>
</div>`},

{ch:4,lbl:'Ch5 Recap',html:`
<div class="tag">Chapter 5 · Summary</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Chapter 5 in One Page</h2>
<div class="grid g3" style="margin-top:16px;max-width:860px;">
  <div class="card a"><div class="ct">The core problem</div><div class="cb">Training error underestimates test error. We need resampling to get a realistic estimate of test performance.</div></div>
  <div class="card t"><div class="ct">Validation set approach</div><div class="cb">Simple split: train on one half, test on other. Easy but unstable — varies with the split. Use only as a starting point.</div></div>
  <div class="card c"><div class="ct">LOOCV</div><div class="cb">Leave one out, repeat n times. Very low bias, but slow and can have high variance. Best for small datasets.</div></div>
  <div class="card b"><div class="ct">k-Fold CV</div><div class="cb">Split into k groups, rotate held-out fold. k=5 or k=10 is the standard. Lower variance than LOOCV, much faster.</div></div>
  <div class="card y"><div class="ct">Bootstrap</div><div class="cb">Sample with replacement to estimate variability of any statistic — SE(β̂), SE(α̂), etc. Extremely flexible.</div></div>
  <div class="card p"><div class="ct">Model selection</div><div class="cb">Use CV to choose: polynomial degree, number of predictors, K in KNN. Pick the model with lowest CV error.</div></div>
</div>`},

// CH6 ─────────────────────────────────────
{ch:5,lbl:'Why Regularize',html:`
<div class="tag">Chapter 6 · Linear Model Selection & Regularization</div>
<h2 class="stitle" style="font-size:clamp(22px,3vw,42px);">Why Plain Least Squares Isn't Always Best</h2>
<div class="grid g3" style="margin-top:16px;max-width:860px;">
  <div class="card c">
    <div class="ct cc">Prediction accuracy</div>
    <div class="cb" style="margin-top:6px;">If n is not much larger than p, OLS overfits. If p &gt; n, OLS doesn't even have a unique solution. Regularization shrinks coefficients to reduce variance.</div>
  </div>
  <div class="card a">
    <div class="ct ac">Model interpretability</div>
    <div class="cb" style="margin-top:6px;">Many predictors may be irrelevant. Including them adds noise and makes the model harder to interpret. <em>Feature selection</em> removes them automatically.</div>
  </div>
  <div class="card t">
    <div class="ct tc">Three broad strategies</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">1. <b style="color:var(--text)">Subset selection</b> — keep only the best predictors<br>2. <b style="color:var(--text)">Shrinkage</b> — keep all predictors but shrink coefficients (Ridge, Lasso)<br>3. <b style="color:var(--text)">Dimension reduction</b> — combine predictors into fewer new variables (PCR, PLS)</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">The key idea behind all regularization methods</div>
  <div class="cb" style="margin-top:5px;">Adding a penalty or constraint to the fitting process. The penalty discourages large coefficients, which reduces variance — at the cost of introducing a small amount of bias. Often leads to much better test-set performance.</div>
</div>`},

{ch:5,lbl:'Subset Selection',html:`
<div class="tag">Chapter 6 · Subset Selection</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Best Subset & Stepwise Selection</h2>
<ul class="steps">
  <li><div class="sn">1</div><div><div class="st">Best Subset Selection</div><div class="sd">Try all 2ᵖ possible subsets of predictors. Keep the best model of each size. Then choose the overall best using CV or AIC/BIC. Problem: with p = 40, this means trying over 1 trillion models — computationally impossible.</div></div></li>
  <li><div class="sn">2</div><div><div class="st">Forward Stepwise Selection</div><div class="sd">Start with no predictors. At each step, add the one that improves the model most. Stops when no improvement. Only considers p(p+1)/2 + 1 models — far fewer. Works even when n &lt; p.</div></div></li>
  <li><div class="sn">3</div><div><div class="st">Backward Stepwise Selection</div><div class="sd">Start with all predictors. At each step, remove the least useful one. Requires n &gt; p. Guaranteed to search different models than forward selection.</div></div></li>
  <li><div class="sn">4</div><div><div class="st">Choosing the best model</div><div class="sd">Use Cₚ, AIC, BIC (adjusted training error), or adjusted R² to compare across model sizes. Or use cross-validation directly to estimate test error.</div></div></li>
</ul>`},

{ch:5,lbl:'Ridge Regression',html:`
<div class="tag">Chapter 6 · Shrinkage</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,46px);">Ridge Regression</h2>
<p class="ssub" style="margin-bottom:6px;">Like OLS, but add a penalty for large coefficients:</p>
<div class="fbox">Minimise: RSS + λ Σ βⱼ²</div>
<div class="grid g3" style="margin-top:12px;max-width:860px;">
  <div class="card a">
    <div class="ct">λ controls shrinkage</div>
    <div class="cb" style="margin-top:6px;">λ = 0 → OLS (no penalty).<br>λ → ∞ → all β → 0 (max shrinkage).<br>Choose λ using cross-validation.</div>
  </div>
  <div class="card t">
    <div class="ct">Why it helps</div>
    <div class="cb" style="margin-top:6px;">Reduces variance of the estimates at the cost of a small bias. When many predictors matter a little, ridge performs well.</div>
  </div>
  <div class="card c">
    <div class="ct">Limitation</div>
    <div class="cb" style="margin-top:6px;">Ridge shrinks coefficients toward zero but <b style="color:var(--text)">never sets them exactly to zero</b>. All predictors stay in the model.</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Standardise your predictors first!</div>
  <div class="cb" style="margin-top:5px;">Ridge penalises large β values, but β size depends on the units of X. Always standardise each predictor to have mean 0 and standard deviation 1 before applying ridge regression.</div>
</div>`},

{ch:5,lbl:'Lasso',html:`
<div class="tag">Chapter 6 · Shrinkage</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,46px);">The Lasso</h2>
<p class="ssub" style="margin-bottom:6px;">Like ridge, but with an absolute value penalty:</p>
<div class="fbox">Minimise: RSS + λ Σ |βⱼ|</div>
<div class="grid g2" style="margin-top:12px;max-width:820px;">
  <div class="card a">
    <div class="ct">The big difference: sparsity</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Unlike ridge, lasso can set coefficients <b style="color:var(--text)">exactly to zero</b>. This performs automatic variable selection!<br><br>When λ is large enough, some β̂ⱼ = 0 exactly → those predictors are removed from the model.</div>
  </div>
  <div class="card t">
    <div class="ct">Ridge vs Lasso — when to use which</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;"><b style="color:var(--text)">Ridge:</b> when many predictors contribute a little (dense signal).<br><b style="color:var(--text)">Lasso:</b> when only a few predictors truly matter (sparse signal). Gives an interpretable model.<br><br>In practice: try both and use CV to choose.</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Geometric intuition</div>
  <div class="cb" style="margin-top:5px;">Ridge constraint is a circle — RSS ellipses can only touch it at points where all β ≠ 0. Lasso constraint is a diamond — RSS ellipses often first touch a corner, where one or more β = exactly 0.</div>
</div>`},

{ch:5,lbl:'PCR & PLS',html:`
<div class="tag">Chapter 6 · Dimension Reduction</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">PCR & Partial Least Squares</h2>
<div class="grid g2" style="margin-top:16px;max-width:820px;">
  <div class="card b">
    <div class="ct bc">Principal Components Regression (PCR)</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">1. Compute the first M principal components of X (linear combinations that capture most variance).<br>2. Regress Y on those M components instead of the original p predictors.<br><br>Works well when most variance in X is related to Y. Choose M via cross-validation.</div>
  </div>
  <div class="card p">
    <div class="ct pc">Partial Least Squares (PLS)</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Like PCR, but the new directions are chosen to explain both X <b style="color:var(--text)">and</b> Y — not just X.<br><br>PLS is supervised — it uses the response Y to guide dimension reduction. Often better than PCR when the principal components of X don't align with Y.</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">When to use dimension reduction methods</div>
  <div class="cb" style="margin-top:5px;line-height:1.9;">• When you have many correlated predictors (p is large or predictors are collinear).<br>• When n is small relative to p.<br>• PCR when you believe the top components of X explain Y. PLS when you want to ensure those components relate to Y.</div>
</div>`},

{ch:5,lbl:'Ch6 Recap',html:`
<div class="tag">Chapter 6 · Summary</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Chapter 6 in One Page</h2>
<div class="grid g3" style="margin-top:16px;max-width:860px;">
  <div class="card c"><div class="ct">Why regularise</div><div class="cb">OLS can overfit. Adding a penalty reduces variance, often improving test performance at the cost of small bias.</div></div>
  <div class="card a"><div class="ct">Subset selection</div><div class="cb">Best subset (exhaustive but slow), forward stepwise (add one at a time), backward stepwise (remove one at a time).</div></div>
  <div class="card t"><div class="ct">Ridge regression</div><div class="cb">Penalty = λΣβⱼ². Shrinks all coefficients toward zero. Never sets any to exactly zero. Good for dense signal.</div></div>
  <div class="card b"><div class="ct">Lasso</div><div class="cb">Penalty = λΣ|βⱼ|. Sets some coefficients to exactly zero → automatic variable selection. Good for sparse signal.</div></div>
  <div class="card y"><div class="ct">Choosing λ</div><div class="cb">Always use cross-validation. Pick the λ that gives the lowest CV error on the held-out data.</div></div>
  <div class="card p"><div class="ct">PCR & PLS</div><div class="cb">Reduce many correlated predictors to M components. PCR uses X variance only. PLS uses both X and Y.</div></div>
</div>`},

// CH7 ─────────────────────────────────────
{ch:6,lbl:'Beyond Linear',html:`
<div class="tag">Chapter 7 · Moving Beyond Linearity</div>
<h2 class="stitle" style="font-size:clamp(22px,3vw,44px);">When a Straight Line Isn't Enough</h2>
<p class="ssub" style="margin-bottom:4px;">Linear models are simple and interpretable — but the linearity assumption is almost always an approximation, and sometimes a poor one.</p>
<div class="grid g3" style="margin-top:14px;max-width:860px;">
  <div class="card a"><div class="ct ac">Polynomial regression</div><div class="cb">Add X², X³, … as predictors. Still linear regression under the hood, but fits curves.</div></div>
  <div class="card t"><div class="ct tc">Step functions</div><div class="cb">Divide X into regions. Fit a constant in each region. Creates a "staircase" function.</div></div>
  <div class="card c"><div class="ct cc">Regression splines</div><div class="cb">Fit different polynomials in different regions, joined smoothly at "knots". Very flexible.</div></div>
  <div class="card b"><div class="ct bc">Smoothing splines</div><div class="cb">Fit a smooth curve by minimising RSS + a roughness penalty. Like ridge but for curves.</div></div>
  <div class="card y"><div class="ct am">Local regression</div><div class="cb">Fit a different line in a sliding window around each point. Like KNN but with regression.</div></div>
  <div class="card p"><div class="ct pc">GAMs</div><div class="cb">Generalized Additive Models — combine all of the above for multiple predictors.</div></div>
</div>`},

{ch:6,lbl:'Polynomial',html:`
<div class="tag">Chapter 7 · Polynomial Regression</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,46px);">Polynomial Regression</h2>
<p class="ssub" style="margin-bottom:6px;">Add powers of X as extra predictors. The model is still linear in the coefficients.</p>
<div class="fbox">Ŷ = β₀ + β₁X + β₂X² + β₃X³ + … + βdXd</div>
<div class="grid g3" style="margin-top:12px;max-width:860px;">
  <div class="card a">
    <div class="ct">How it works</div>
    <div class="cb" style="margin-top:6px;">Create new variables: X, X², X³, … and run standard linear regression. Coefficients estimated by OLS. Flexible enough to model curves.</div>
  </div>
  <div class="card t">
    <div class="ct">Wage vs Age example</div>
    <div class="cb" style="margin-top:6px;">A degree-4 polynomial fits wage as a function of age — captures the rise until 60 and then decline. Better than a straight line.</div>
  </div>
  <div class="card c">
    <div class="ct">Warning: don't go too high</div>
    <div class="cb" style="margin-top:6px;">Degree &gt; 4 or 5 creates wild wiggles, especially near the edges. Overfitting gets worse as d increases. Use CV to pick d.</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Also works for classification</div>
  <div class="cb" style="margin-top:5px;">Use polynomial terms inside logistic regression to create a curved decision boundary. Example: predict P(wage &gt; $250K) as a non-linear function of age.</div>
</div>`},

{ch:6,lbl:'Splines',html:`
<div class="tag">Chapter 7 · Splines</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,46px);">Regression Splines & Smoothing Splines</h2>
<div class="grid g2" style="margin-top:16px;max-width:820px;">
  <div class="card a">
    <div class="ct ac">Regression Splines</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Divide X into K+1 regions using K <b style="color:var(--text)">knots</b>. Fit a polynomial (usually cubic) in each region. Constrain them to join smoothly (continuous first and second derivatives at knots).<br><br><b style="color:var(--text)">Cubic spline</b> = the most common choice. Looks smooth to the human eye.<br><br>More knots = more flexible, but more risk of overfitting.</div>
  </div>
  <div class="card t">
    <div class="ct tc">Smoothing Splines</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">Minimise RSS + λ × (roughness penalty).<br><br>λ = 0 → interpolate every point (overfit).<br>λ → ∞ → perfectly straight line (underfit).<br><br>λ controls flexibility. Choose with cross-validation or GCV (generalised CV). The "effective degrees of freedom" decreases as λ grows.</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Choosing knot locations</div>
  <div class="cb" style="margin-top:5px;">Place more knots where the data is most variable or where the function changes rapidly. A simple rule: place knots at uniform quantiles of X. Use CV to choose the number of knots.</div>
</div>`},

{ch:6,lbl:'GAMs',html:`
<div class="tag">Chapter 7 · Generalized Additive Models</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,44px);">Generalized Additive Models (GAMs)</h2>
<p class="ssub" style="margin-bottom:6px;">Extend all the non-linear tools above to work with multiple predictors:</p>
<div class="fbox">Ŷ = β₀ + f₁(X₁) + f₂(X₂) + … + fₚ(Xₚ)</div>
<div class="grid g3" style="margin-top:12px;max-width:860px;">
  <div class="card a">
    <div class="ct">Each fⱼ can be anything</div>
    <div class="cb" style="margin-top:6px;">f₁ could be a spline, f₂ a polynomial, f₃ a step function. Mix and match. Each predictor gets its own flexible function.</div>
  </div>
  <div class="card t">
    <div class="ct">Pros</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">• Non-linear fits for each predictor<br>• Interpretable: see how each X affects Y separately<br>• More flexible than linear models<br>• Works for regression and classification</div>
  </div>
  <div class="card c">
    <div class="ct">Cons</div>
    <div class="cb" style="margin-top:6px;line-height:1.8;">• Additive — misses interaction effects between predictors<br>• Can miss situations where effect of X₁ depends on X₂<br>• To add interactions: include X₁×X₂ terms (increases complexity)</div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">GAMs for classification</div>
  <div class="cb" style="margin-top:5px;">Use logistic regression with non-linear terms: log(p/(1−p)) = β₀ + f₁(X₁) + f₂(X₂) + … Allows curved decision boundaries while remaining interpretable.</div>
</div>`},

{ch:6,lbl:'Local Regression',html:`
<div class="tag">Chapter 7 · Local Regression</div>
<h2 class="stitle" style="font-size:clamp(24px,3.5vw,46px);">Local Regression & Step Functions</h2>
<div class="twoc" style="max-width:840px;margin-top:16px;">
  <div class="cl">
    <div class="card b" style="margin-bottom:12px;">
      <div class="ct bc">Local Regression (LOESS)</div>
      <div class="cb" style="margin-top:6px;line-height:1.8;">To predict at a point x₀:<br>1. Find the nearest s fraction of training points.<br>2. Fit a weighted regression (nearby points get more weight).<br>3. Use that local fit to predict x₀.<br><br><b style="color:var(--text)">s = span</b> controls flexibility. Small s = very flexible (wiggly). Large s = smoother (more biased).</div>
    </div>
  </div>
  <div class="cr">
    <div class="card y">
      <div class="ct am">Step Functions</div>
      <div class="cb" style="margin-top:6px;line-height:1.8;">Cut X into K bins. Fit a constant (the mean) in each bin.<br><br>Creates a piecewise constant "staircase" fit. Easy to interpret.<br><br>Limitation: assumes Y is constant within each bin, which can be unrealistic for continuous relationships.</div>
    </div>
  </div>
</div>
<div class="card" style="max-width:820px;margin-top:12px;text-align:left;">
  <div class="ct">Comparing all non-linear methods</div>
  <div class="cb" style="margin-top:5px;line-height:1.9;">Polynomial → global, simple. Step functions → global, constant. Splines → local, smooth. Local regression → locally adaptive, smooth. GAMs → multi-predictor, additive. Each has different bias-variance trade-offs. Use CV to choose.</div>
</div>`},

  <div class="card a"><div class="ct">Polynomial regression</div><div class="cb">Add X², X³, … as predictors. Same OLS fitting. Easy. Watch out for wild behaviour at boundaries for high degrees.</div></div>

// ─── ENGINE ───────────────────────────────────────────────────────
const TOTAL=SD.length;
let cur=0;
const TABS=[
  {id:'t0',start:0},{id:'t1',start:6},{id:'t2',start:12},{id:'t3',start:18},
  {id:'t4',start:24},{id:'t5',start:30},{id:'t6',start:36}
];

function buildSlides(){
  const area=document.getElementById('sarea');
  SD.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='slide'+(i===0?' a':'');
    d.id='s'+i;
    d.innerHTML=s.html;
    area.appendChild(d);
  });
}
function buildThumbs(){
  const tnav=document.getElementById('tnav');
  SD.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='thumb'+(i===0?' a':'');
    b.textContent=s.lbl;
    b.onclick=()=>goTo(i);
    tnav.appendChild(b);
  });
}
function updateTabs(){
  TABS.forEach((t,ti)=>{
    const next=TABS[ti+1]?TABS[ti+1].start:TOTAL;
    document.getElementById(t.id).classList.toggle('a',cur>=t.start&&cur<next);
  });
}
function goTo(n){
  if(n<0||n>=TOTAL)return;
  document.getElementById('s'+cur).classList.remove('a');
  document.querySelectorAll('.thumb')[cur].classList.remove('a');
  cur=n;
  document.getElementById('s'+cur).classList.add('a');
  const th=document.querySelectorAll('.thumb')[cur];
  th.classList.add('a');
  th.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  document.getElementById('ctr').textContent=(cur+1)+' / '+TOTAL;
  document.getElementById('pf').style.width=((cur+1)/TOTAL*100)+'%';
  updateTabs();
}
function next(){goTo(cur+1);}
function prev(){goTo(cur-1);}
function jmp(start){goTo(start);}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  if(e.key==='f'||e.key==='F')document.documentElement.requestFullscreen?.();
});
buildSlides();buildThumbs();goTo(0);
</script>
</body>
</html>
